name: akande-prod

services:
  akande-bot:
    build: .
    container_name: akande-bot
    restart: unless-stopped
    environment:
      APP_ENVIRONMENT: production
      BOT_TOKEN: ${BOT_TOKEN}
      DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
    depends_on:
      akande-db:
        condition: service_healthy
        restart: true

  akande-db:
    image: postgres:18
    container_name: akande-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "127.0.0.1:54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
