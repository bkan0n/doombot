name: akande-dev

services:
  akande-bot-dev:
    build: .
    container_name: akande-bot-dev
    restart: unless-stopped
    environment:
      APP_ENVIRONMENT: development
      BOT_TOKEN: ${BOT_TOKEN}
      DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
    depends_on:
      akande-db-dev:
        condition: service_healthy
        restart: true

  akande-db-dev:
    image: postgres:18
    container_name: akande-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "127.0.0.1:54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
