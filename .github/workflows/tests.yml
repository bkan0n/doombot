name: Tests

on:
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (defaults to triggering SHA)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest
